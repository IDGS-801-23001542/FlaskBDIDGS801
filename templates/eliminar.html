{% extends "layout.html" %}
{% import "_macros.html" as macros %}
{% block container %}

<div class="w-full max-w-xl px-4 py-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Eliminar alumno</h2>

  <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6">
    <p class="text-gray-700 mb-4">
      ¿Seguro que deseas eliminar este alumno? Esta acción no se puede deshacer.
    </p>

    <form method="POST" action="{{ url_for('eliminar') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="id" value="{{ form.id.data }}">

      <div class="mb-3">
        <label for="nombre" class="form-label">nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre"
               value="{{ form.nombre.data }}" disabled>
      </div>

      <div class="mb-3">
        <label for="apaterno" class="form-label">apaterno</label>
        <input type="text" class="form-control" id="apaterno" name="apaterno"
               value="{{ form.apaterno.data }}" disabled>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">email</label>
        <input type="email" class="form-control" id="email" name="email"
               value="{{ form.email.data }}" disabled>
      </div>

      <div class="flex gap-3 mt-4">
        <button type="submit"
          class="text-danger bg-neutral-primary border border-danger hover:bg-danger hover:text-white focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
          Eliminar
        </button>

        <a href="{{ url_for('index') }}"
          class="text-body bg-neutral-primary border border-default hover:bg-neutral-secondary-soft hover:text-heading focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
