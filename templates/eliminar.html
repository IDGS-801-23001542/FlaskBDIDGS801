{% extends "layout.html" %}
{% block container %}

<div class="w-full max-w-xl px-4 py-8">
  <h2 class="text-2xl font-bold mb-6">Eliminar alumno</h2>

  <div class="bg-white border rounded-lg p-6">
    <form method="POST" action="{{ url_for('eliminar') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="id" value="{{ form.id.data }}">

      <p><strong>Nombre:</strong> {{ form.nombre.data }}</p>
      <p><strong>Apellidos:</strong> {{ form.apallidos.data }}</p>
      <p><strong>Email:</strong> {{ form.email.data }}</p>
      <p><strong>Teléfono:</strong> {{ form.telefono.data }}</p>

      <button type="submit" class="bg-red-600 text-white px-4 py-2 mt-3">
        Eliminar
      </button>
    </form>
  </div>
</div>

{% endblock %}
