{% extends "layout.html" %}
{% block container %}

<div class="w-full max-w-xl px-4 py-8">
  <h2 class="text-2xl font-bold mb-6">Eliminar curso</h2>

  <div class="bg-white border rounded-lg p-6">
    <form method="POST" action="{{ url_for('cursos.eliminar_curso') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="curso_id" value="{{ curso.id }}">

      <p><strong>Curso:</strong> {{ curso.nombre }}</p>
      <p><strong>Descripción:</strong> {{ curso.descripcion }}</p>
      <p><strong>Maestro:</strong> {{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}</p>

      <div class="flex gap-3 mt-4">

        <div class="relative">
          <button type="submit" data-tooltip-target="tt-curso-del"
            class="inline-flex items-center justify-center w-10 h-10 text-white bg-danger hover:bg-danger-strong
                   focus:ring-4 focus:ring-danger-medium rounded-base">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/>
            </svg>
            <span class="sr-only">Eliminar</span>
          </button>

          <div id="tt-curso-del" role="tooltip"
            class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-xs opacity-0 tooltip">
            Eliminar
            <div class="tooltip-arrow" data-popper-arrow></div>
          </div>
        </div>

        <div class="relative">
          <a href="{{ url_for('cursos.listado_cursos') }}" data-tooltip-target="tt-curso-back"
            class="inline-flex items-center justify-center w-10 h-10 text-body bg-neutral-secondary-medium
                   border border-default-medium hover:bg-neutral-tertiary-medium focus:ring-4 focus:ring-neutral-tertiary rounded-base">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5H1m0 0 4 4M1 5l4-4"/>
            </svg>
            <span class="sr-only">Regresar</span>
          </a>

          <div id="tt-curso-back" role="tooltip"
            class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-xs opacity-0 tooltip">
            Regresar
            <div class="tooltip-arrow" data-popper-arrow></div>
          </div>
        </div>

      </div>

    </form>
  </div>
</div>

{% endblock %}
