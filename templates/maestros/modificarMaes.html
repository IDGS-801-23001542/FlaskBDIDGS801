{% extends "layout.html" %}
{% block container %}

<div class="w-full max-w-xl px-4 py-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Modificar maestro</h2>

  <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6">
    <form method="POST" action="{{ url_for('maestros.modificar_maestros') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <label class="block mb-2">Matricula</label>
      <input class="border w-full mb-4 p-2" type="number" name="matricula" value="{{ form.matricula.data }}" readonly>

      <label class="block mb-2">Nombre</label>
      <input class="border w-full mb-4 p-2" type="text" name="nombre" value="{{ form.nombre.data }}">

      <label class="block mb-2">Apellidos</label>
      <input class="border w-full mb-4 p-2" type="text" name="apellidos" value="{{ form.apellidos.data }}">

      <label class="block mb-2">Especialidad</label>
      <input class="border w-full mb-4 p-2" type="text" name="especialidad" value="{{ form.especialidad.data }}">

      <label class="block mb-2">Email</label>
      <input class="border w-full mb-4 p-2" type="email" name="email" value="{{ form.email.data }}">

      <div class="flex gap-3 mt-4">
        <button type="submit"
          class="text-white bg-warning box-border border border-transparent hover:bg-warning-strong focus:ring-4 focus:ring-warning-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
          Guardar
        </button>

        <a href="{{ url_for('maestros.listado_maestros') }}"
           class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
          Regresar
        </a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
