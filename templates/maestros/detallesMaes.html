{% extends "layout.html" %}
{% block container %}

<div class="w-full flex justify-center px-4 py-10">

  <div class="max-w-md w-full bg-white border border-gray-200 rounded-lg shadow-sm">
    <div class="flex flex-col items-center py-10">

      <img class="w-16 h-16 mb-4 rounded-full shadow-md object-cover"
           src="{{ url_for('static', filename='img/toallin.png') }}"
           alt="Maestro" />

      <div class="flex flex-col justify-between p-4 leading-normal text-center">

        <h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900">
          Matrícula: {{ matricula }}
        </h5>

        <h3 class="mb-2 text-xl tracking-tight text-gray-900">
          Nombre: {{ nombre }}
        </h3>

        <h3 class="mb-2 text-xl tracking-tight text-gray-900">
          Apellidos: {{ apellidos }}
        </h3>

        <h3 class="mb-2 text-xl tracking-tight text-gray-900">
          Especialidad: {{ especialidad }}
        </h3>

        <h3 class="mb-2 text-xl tracking-tight text-gray-900">
          Correo: {{ email }}
        </h3>

      </div>

      <div class="flex gap-3 mt-6">
      <div class="relative">
        <a href="{{ url_for('maestros.listado_maestros') }}" data-tooltip-target="tt-maes-back-det"
          class="inline-flex items-center justify-center w-10 h-10 text-body bg-neutral-secondary-medium
                border border-default-medium hover:bg-neutral-tertiary-medium focus:ring-4 focus:ring-neutral-tertiary rounded-base">
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5H1m0 0 4 4M1 5l4-4"/>
          </svg>
          <span class="sr-only">Regresar</span>
        </a>

        <div id="tt-maes-back-det" role="tooltip"
          class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-xs opacity-0 tooltip">
          Regresar
          <div class="tooltip-arrow" data-popper-arrow></div>
        </div>
      </div>
</div>

    </div>
  </div>

</div>

{% endblock %}
